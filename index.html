<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pocket Space Idle GIFs</title>
    <style>
        body {
            text-align: center;
            background-color: #f4f4f4;
            font-family: Arial, sans-serif;
        }
        .gif-container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        .gif-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .gif-item img {
            width: 300px;
            height: auto;
            border: 2px solid #333;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>Body Sizes</h1>
    <div class="gif-container">
        <div class="gif-item">
            <h2>Small</h2>
            <img src="small.gif" alt="Small">
        </div>
        <div class="gif-item">
            <h2>Medium</h2>
            <img src="medium.gif" alt="Medium">
        </div>
        <div class="gif-item">
            <h2>Medium Fit</h2>
            <img src="mediumfit.gif" alt="Medium Fit">
        </div>
        <div class="gif-item">
            <h2>Large</h2>
            <img src="large.gif" alt="Large">
        </div>
        <div class="gif-item">
            <h2>X-Large</h2>
            <img src="xlarge.gif" alt="X-Large">
        </div>
    </div>
</body>
</html>
